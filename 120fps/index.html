<!DOCTYPE html>
<html>
  <head>
    <title>fecking ffmpeg test</title>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
  </head>
  <body>
    <h1>upload a fecking video</h1>
    <input type="file" id="uploader">
    
    <script>
      const { createFFmpeg, fetchFile } = FFmpeg;
      
      const ffmpeg = createFFmpeg({ 
        log: true,
        corePath: 'https://unpkg.com/@ffmpeg/core-st@0.11.1/dist/ffmpeg-core.js'
      });

      document.getElementById('uploader').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        console.log('loading the fecking ffmpeg...');
        
        await ffmpeg.load();
        
        console.log('writing fecking file...');
        ffmpeg.FS('writeFile', 'input.mp4', await fetchFile(file));
        
        console.log('starting fecking transcode...');
        await ffmpeg.run('-i', 'input.mp4', 'output.webm');
        
        console.log('fecking done!');
        const data = ffmpeg.FS('readFile', 'output.webm');
        console.log('output file ready:', data);
      });
    </script>
  </body>
</html>
