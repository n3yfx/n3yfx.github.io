<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>N3YFX_ | Advanced 120fps</title>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <style>
        body { background: #050505; color: #fff; font-family: 'Inter', sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .wrapper { width: 500px; background: #111; padding: 30px; border-radius: 12px; border: 1px solid #333; }
        .header { margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .ui-box { background: #1a1a1a; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 15px; }
        button { flex: 1; padding: 10px; border: none; border-radius: 4px; cursor: pointer; background: #333; color: white; font-weight: 600; }
        button.active { background: #fff; color: #000; }
        #progress { width: 100%; height: 5px; background: #333; margin-top: 10px; overflow: hidden; border-radius: 2px; }
        #bar { width: 0%; height: 100%; background: #00ff00; transition: width 0.3s; }
        #console-log { font-family: monospace; font-size: 0.7rem; color: #00ff00; margin-top: 15px; background: #000; padding: 10px; border-radius: 4px; height: 100px; overflow-y: auto; }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="header"><h2>advanced interpolator</h2></div>
    <div class="ui-box">
        <label style="font-size: 0.8rem; color: #888;">frame interpolation</label>
        <div class="btn-group">
            <button class="active" id="btn-60" onclick="setFps('60')">60 fps</button>
            <button id="btn-120" onclick="setFps('120')">120 fps</button>
        </div>
    </div>
    <div class="ui-box">
        <input type="file" id="file" style="display:none">
        <button onclick="document.getElementById('file').click()">select file</button>
        <p id="filename" style="margin-top:10px; font-size:0.8rem;">no file selected</p>
    </div>
    <button id="process" style="width:100%; background:#00ff00; color:black; font-weight:bold; padding: 12px;">process video</button>
    <div id="progress"><div id="bar"></div></div>
    <div id="console-log">awaiting asset upload...</div>
</div>
<script>
    const { createFFmpeg, fetchFile } = FFmpeg;
    
    // THIS IS THE FECKING FIX. 
    // Force single-threaded core. This bypasses the SharedArrayBuffer requirement.
    const ffmpeg = createFFmpeg({ 
        log: true,
        corePath: 'https://unpkg.com/@ffmpeg/core-st@0.11.1/dist/ffmpeg-core.js'
    });
    
    let fps = '60';
    const filename = document.getElementById('filename');
    const processBtn = document.getElementById('process');
    const bar = document.getElementById('bar');
    const consoleLog = document.getElementById('console-log');

    function setFps(val) { 
        fps = val; 
        document.querySelectorAll('button').forEach(b => {
            if(b.id.includes('btn')) b.classList.remove('active');
        });
        event.target.classList.add('active'); 
    }

    document.getElementById('file').onchange = (e) => {
        filename.textContent = e.target.files[0].name;
        consoleLog.textContent = `Target: ${e.target.files[0].name}`;
    };

    processBtn.onclick = async () => {
        consoleLog.textContent = 'status: loading engine...';
        if (!ffmpeg.isLoaded()) await ffmpeg.load();
        
        const file = document.getElementById('file').files[0];
        if(!file) return consoleLog.textContent = 'error: no file';
        
        ffmpeg.FS('writeFile', file.name, await fetchFile(file));
        consoleLog.textContent = 'status: processing...';
        bar.style.width = '50%';
        
        await ffmpeg.run('-itsscale', fps === '60' ? '2' : '6', '-i', file.name, '-c:v', 'copy', '-c:a', 'copy', 'out.mp4');
        
        bar.style.width = '100%';
        consoleLog.textContent = 'status: done!';
        const data = ffmpeg.FS('readFile', 'out.mp4');
        const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([data.buffer])); a.download = 'output.mp4'; a.click();
    };
</script>
</body>
</html>
