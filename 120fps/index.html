<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>n3yfx_ | ffmpeg 120fps frame renderer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #050505;
            color: #b3b3b3;
            font-family: 'Inter', sans-serif;
            padding: 3rem 5rem;
            min-height: 100vh;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #141414;
            padding-bottom: 1.5rem;
            margin-bottom: 3rem;
        }

        .logo {
            color: #ffffff;
            font-weight: 700;
            letter-spacing: 2px;
            font-size: 1.2rem;
            text-decoration: none;
        }

        .back-btn {
            color: #666;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1px;
            transition: color 0.2s;
        }

        .back-btn:hover {
            color: #fff;
        }

        .tool-container {
            max-width: 600px;
            margin: 0 auto;
            background: #0a0a0a;
            border: 1px solid #161616;
            padding: 3rem;
            border-radius: 6px;
        }

        .project-num {
            font-size: 0.7rem;
            color: #444;
            letter-spacing: 2px;
            font-weight: 700;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        h1 {
            color: #fff;
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        p {
            color: #888;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .fps-selector {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .fps-option {
            flex: 1;
            background: #050505;
            border: 1px solid #161616;
            color: #666;
            padding: 0.75rem;
            text-align: center;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .fps-option.active {
            border-color: #fff;
            color: #fff;
            background: #111;
        }

        .drop-zone {
            border: 2px dashed #222;
            padding: 3rem 2rem;
            text-align: center;
            margin-bottom: 1.5rem;
            background: #050505;
            cursor: pointer;
            color: #666;
            font-size: 0.85rem;
            transition: border-color 0.2s, color 0.2s;
        }

        .drop-zone:hover {
            border-color: #444;
            color: #888;
        }

        .btn-action {
            background: #fff;
            color: #000;
            border: none;
            padding: 0.75rem 1rem;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            border-radius: 2px;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.3;
            pointer-events: none;
            transition: opacity 0.2s;
            margin-bottom: 1.5rem;
        }

        .btn-action.ready {
            opacity: 1;
            pointer-events: auto;
        }

        #file-status {
            font-size: 0.85rem;
            color: #fff;
            margin-bottom: 1.5rem;
            font-weight: 600;
            text-align: center;
        }

        .output-box {
            background: #050505;
            border: 1px solid #161616;
            padding: 1.5rem;
            border-radius: 4px;
            display: none;
            margin-top: 1.5rem;
        }

        .output-box h3 {
            color: #fff;
            font-size: 0.85rem;
            margin-bottom: 0.75rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .command-text {
            font-family: monospace;
            color: #00ff00;
            font-size: 0.85rem;
            background: #000;
            padding: 0.75rem;
            border-radius: 2px;
            word-break: break-all;
            border: 1px solid #111;
        }

        @media (max-width: 768px) {
            body {
                padding: 2rem;
            }
            .tool-container {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <a href="../" class="logo">N3YFX_</a>
        <a href="../" class="back-btn">← back to deploys</a>
    </header>

    <main class="tool-container">
        <div class="project-num">engine_core_01</div>
        <h1>ffmpeg 120fps interpolator</h1>
        <p>modify how tiktok reads your timing profiles to completely neutralize server compression scales.</p>
        
        <div class="fps-selector">
            <div class="fps-option active" data-fps="60">60 fps base</div>
            <div class="fps-option" data-fps="120">120 fps base</div>
        </div>

        <div class="drop-zone" id="render-drop-zone">
            drag & drop target edit file here or click to select
            <input type="file" id="render-file-input" accept="video/*" style="display: none;">
        </div>

        <div id="file-status"></div>
        
        <button class="btn-action" id="render-btn">generate terminal sequence</button>

        <div class="output-box" id="cmd-output-box">
            <h3>generated terminal command</h3>
            <div class="command-text" id="cmd-string"></div>
        </div>
    </main>

    <script>
        const dropZone = document.getElementById('render-drop-zone');
        const fileInput = document.getElementById('render-file-input');
        const renderBtn = document.getElementById('render-btn');
        const fileStatus = document.getElementById('file-status');
        const fpsOptions = document.querySelectorAll('.fps-option');
        const cmdOutputBox = document.getElementById('cmd-output-box');
        const cmdString = document.getElementById('cmd-string');
        
        let loadedFile = null;
        let selectedFps = '60';

        fpsOptions.forEach(opt => {
            opt.addEventListener('click', () => {
                fpsOptions.forEach(o => o.classList.remove('active'));
                opt.classList.add('active');
                selectedFps = opt.getAttribute('data-fps');
                if (loadedFile) updateCommandText();
            });
        });

        dropZone.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', (e) => {
            handleUploadedFile(e.target.files[0]);
        });

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#fff';
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.style.borderColor = '#222';
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#222';
            handleUploadedFile(e.dataTransfer.files[0]);
        });

        function handleUploadedFile(file) {
            if (file && file.type.startsWith('video/')) {
                loadedFile = file;
                fileStatus.textContent = `TARGET ACQUIRED: ${file.name}`;
                renderBtn.classList.add('ready');
                cmdOutputBox.style.display = 'none';
            } else {
                fileStatus.textContent = 'invalid asset container format, bradar.';
                renderBtn.classList.remove('ready');
                cmdOutputBox.style.display = 'none';
            }
        }

        function updateCommandText() {
            const scale = selectedFps === '60' ? '2' : '6';
            cmdString.textContent = `ffmpeg -itsscale ${scale} -i ${loadedFile.name} -c:v copy -c:a copy output.mp4`;
        }

        renderBtn.addEventListener('click', () => {
            if (!loadedFile) return;
            renderBtn.textContent = 'compiling vector scales...';
            renderBtn.style.opacity = '0.5';
            renderBtn.style.pointerEvents = 'none';

            setTimeout(() => {
                updateCommandText();
                cmdOutputBox.style.display = 'block';
                renderBtn.textContent = 'generate terminal sequence';
                renderBtn.style.opacity = '1';
                renderBtn.style.pointerEvents = 'auto';
            }, 1200);
        });
    </script>
</body>
</html>
