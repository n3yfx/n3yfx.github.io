<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>fecking ffmpeg fix</title>
  <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
</head>
<body>
  <h1>fixing your fecking code, finally</h1>
  <script>
    const { createFFmpeg } = FFmpeg;
    
    // this is the only way you're getting past the fecking proxy_main error
    const ffmpeg = createFFmpeg({ 
      log: true,
      corePath: 'https://unpkg.com/@ffmpeg/core-st@0.11.1/dist/ffmpeg-core.js'
    });

    (async () => {
      console.log('loading fecking ffmpeg...');
      await ffmpeg.load();
      console.log('fecking loaded, finally.');
    })();
  </script>
</body>
</html>
