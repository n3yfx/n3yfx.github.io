<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>engine_core_01</title>
    <script src="coi-serviceworker.js"></script>
    <style>
        body { 
            background: #0c0c0c; 
            color: #fff; 
            font-family: 'inter', -apple-system, sans-serif; 
            display: flex; 
            justify-content: center; 
            padding-top: 80px; 
            margin: 0; 
        }
        .wrapper { width: 500px; padding: 20px; }
        .engine { font-size: 0.9rem; color: #777; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 10px; }
        h1 { font-size: 2.2rem; margin: 0 0 10px 0; font-weight: 800; line-height: 1.1; }
        p { font-size: 1.1rem; color: #aaa; margin-bottom: 40px; line-height: 1.5; }
        .btn-group { display: flex; gap: 15px; margin-bottom: 30px; }
        .btn-mode { flex: 1; padding: 18px; border: 1px solid #333; background: #111; color: #fff; cursor: pointer; font-size: 1rem; font-weight: 600; }
        .drop-zone { border: 2px dashed #444; padding: 60px 20px; text-align: center; cursor: pointer; color: #888; margin-bottom: 30px; font-size: 1.1rem; transition: 0.2s; }
        .drop-zone:hover { border-color: #fff; color: #fff; }
        .drop-zone.active { border-color: #0f0; color: #0f0; }
        .target-label { color: #fff; font-weight: bold; margin-bottom: 30px; text-align: center; font-size: 1.2rem; }
        #genBtn { width: 100%; padding: 20px; background: #fff; color: #000; border: none; cursor: pointer; font-weight: bold; font-size: 1.2rem; }
        #genBtn:disabled { background: #333; color: #666; cursor: not-allowed; }
        .cmd-box { border: 1px solid #333; padding: 25px; margin-top: 40px; background: #111; color: #0f0; font-family: 'courier new', monospace; display: none; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="engine">engine_core_01</div>
    <h1>ffmpeg 120fps interpolator</h1>
    <p>modify how tiktok reads your timing profiles to completely neutralize server compression scales.</p>

    <div class="btn-group">
        <button class="btn-mode">60 fps base</button>
        <button class="btn-mode">120 fps base</button>
    </div>

    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
        drag & drop target edit file here or click to select
    </div>
    <input type="file" id="fileInput" hidden>

    <div class="target-label" id="targetLabel"></div>

    <button id="genBtn">generate terminal sequence</button>

    <div class="cmd-box" id="cmdBox">
        <div style="font-size: 0.8rem; color: #666; margin-bottom: 10px;">generated terminal command</div>
        <div id="cmdText"></div>
    </div>
</div>

<script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
<script>
    const { createFFmpeg, fetchFile } = FFmpeg;
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const targetLabel = document.getElementById('targetLabel');
    const genBtn = document.getElementById('genBtn');
    const cmdBox = document.getElementById('cmdBox');
    const cmdText = document.getElementById('cmdText');

    const ffmpeg = createFFmpeg({ log: true });

    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
            dropZone.innerText = "target acquired: " + e.target.files[0].name;
            dropZone.classList.add('active');
        }
    });

    genBtn.addEventListener('click', async () => {
        if (!fileInput.files[0]) {
            alert("pick a file first, genius.");
            return;
        }

        genBtn.disabled = true;
        genBtn.innerText = "processing...";
        
        try {
            if (!ffmpeg.isLoaded()) {
                await ffmpeg.load();
            }
            
            const fileName = fileInput.files[0].name;
            ffmpeg.FS('writeFile', fileName, await fetchFile(fileInput.files[0]));
            
            await ffmpeg.run('-itsscale', '2', '-i', fileName, '-c:v', 'copy', '-c:a', 'copy', 'output.mp4');
            
            const data = ffmpeg.FS('readFile', 'output.mp4');
            const url = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
            const a = document.createElement('a');
            a.href = url;
            a.download = 'output.mp4';
            a.click();
            
            cmdText.innerText = `ffmpeg -itsscale 2 -i ${fileName} -c:v copy -c:a copy output.mp4`;
            cmdBox.style.display = 'block';
            genBtn.innerText = "sequence generated";
        } catch (err) {
            console.error(err);
            genBtn.disabled = false;
            genBtn.innerText = "failed - try again";
        }
    });
</script>

</body>
</html>
